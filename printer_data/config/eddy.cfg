[mcu eddy]
canbus_uuid: 4f5ebaf1e3aa

[probe_eddy_current eddy]
sensor_type: ldc1612
z_offset: 0.5
x_offset: 0
y_offset: 0
i2c_mcu: eddy
i2c_bus: i2c0f
# intb_pin: eddy:gpio...
tap_threshold: 20
# Recommended starting values from Klipper docs:
samples: 3
samples_tolerance: 0.025
samples_tolerance_retries: 3

[force_move]
enable_force_move: True

[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
gcode:
  {% set Z = printer.toolhead.position.z %}
  SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}

[gcode_macro SET_Z_FROM_PROBE]
gcode:
  {% set METHOD = params.METHOD | default("automatic") %}
  PROBE METHOD={METHOD}
  _RELOAD_Z_OFFSET_FROM_PROBE
  G0 Z5