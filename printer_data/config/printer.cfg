#####################################################################
##                          Fan's
#####################################################################

# Fan3
[controller_fan Stepper_fan]
pin: PF8
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.02
fan_speed: 1
idle_timeout: 300
heater: extruder, heater_bed
stepper: stepper_x, stepper_y

[temperature_fan MCU_fan]
pin: PF6 #CB2: gpiochip0/gpio19
kick_start_time: 0.5
max_power: 1.0
min_temp: 0
max_temp: 90
#hardware_pwm: true
target_temp: 50
sensor_type: temperature_host # please comment out or remove the [temperature_sensor Host_temp] section if you don't want the temperature shown twice in the interface.
max_speed: 1.0
min_speed: 0.15
control: pid
pid_Kp: 2.0     ;40
pid_Ki: 5.0     ;0.2
pid_Kd: 0.5     ;0.1
pid_deriv_time: 2.0
#control: watermark # use this control if pid control does not work for your fan

