[include timelapse.cfg]
[include mmu/base/*.cfg]
[include mmu/optional/client_macros.cfg]
#[include mmu/addons/blobifier.cfg]
[include mmu/addons/mmu_erec_cutter.cfg]
[include ./KAMP_LiTE/*.cfg]
[force_move]
enable_force_move: True
# See docs/Config_Reference.md for a description of parameters.
[include stealthburner_leds.cfg]
#[include eddy-ng.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include toolhead.cfg]
[exclude_object]
[include eddy.cfg]
[pause_resume]
[gcode_arcs]                       
resolution: 1.0        
[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

[printer]
kinematics: corexy           
max_velocity: 700            
max_accel: 20000             
#max_accel_to_decel: 10000 # deprecated
minimum_cruise_ratio: 0.5
max_z_velocity: 20           
max_z_accel: 500             
square_corner_velocity: 5.0 

#####################################################################
##                          MCU
#####################################################################

[mcu CB2]
serial: /tmp/klipper_host_mcu

[mcu EBBCan]
canbus_uuid: 695b4496fc45


[mcu]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: 5608b16fd7c3

#[temperature_sensor CB2]                # BTT-PI temperature sensor configuration
#sensor_type: temperature_host           # Sensor type

#[mcu pico]
#serial: /dev/ttyACM0 #serial: /dev/serial/by-id/usb-Klipper_rp2040_F534B717375B4C53-if00 #serial: /dev/ttyACM0
