[filament_switch_sensor filament_sensor]
switch_pin: ^EBBCan:gpio6
pause_on_runout: False
insert_gcode:
    { action_respond_info("Insert Detected autoload") }
    AUTOLOAD_TO_POST
runout_gcode:
    { action_respond_info("Runout Detected") }
    {% if printer.print_stats.state == "printing" %}
        _FIL_CHANGE_PARK
    {% endif %}

[filament_switch_sensor post_extruder]
switch_pin: ^EBBCan:gpio24
pause_on_runout: False
insert_gcode:
    { action_respond_info("Post sensor detected filament") }

[gcode_macro AUTOLOAD_TO_POST]
variable_active: 0
variable_steps: 0
variable_load_temp: 220
variable_restore_target: 0
gcode:
    {% set target = printer["gcode_macro AUTOLOAD_TO_POST"].load_temp|int %}
    {% set current_target = printer.extruder.target|int %}
    {% set current_temp = printer.extruder.temperature|float %}

    {% if printer["gcode_macro AUTOLOAD_TO_POST"].active|int == 1 %}
        { action_respond_info("Autoload already running") }

    {% elif printer["filament_switch_sensor post_extruder"].filament_detected %}
        { action_respond_info("Post sensor already triggered, not loading") }

    {% elif not printer["filament_switch_sensor filament_sensor"].filament_detected %}
        { action_respond_info("Pre sensor not active, aborting autoload") }

    {% else %}
        SET_GCODE_VARIABLE MACRO=AUTOLOAD_TO_POST VARIABLE=active VALUE=1
        SET_GCODE_VARIABLE MACRO=AUTOLOAD_TO_POST VARIABLE=steps VALUE=0
        SET_GCODE_VARIABLE MACRO=AUTOLOAD_TO_POST VARIABLE=restore_target VALUE={current_target}

        {% if current_temp < target %}
            { action_respond_info("Heating extruder for autoload") }
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={target}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target}
        {% endif %}

        _AUTOLOAD_TO_POST_LOOP
    {% endif %}

[gcode_macro _AUTOLOAD_TO_POST_LOOP]
gcode:
    {% set pre_hit = printer["filament_switch_sensor filament_sensor"].filament_detected %}
    {% set post_hit = printer["filament_switch_sensor post_extruder"].filament_detected %}
    {% set steps = printer["gcode_macro AUTOLOAD_TO_POST"].steps|int %}

    {% if not pre_hit %}
        { action_respond_info("Autoload cancelled, pre sensor cleared") }
        _AUTOLOAD_RESTORE_TEMP

    {% elif post_hit %}
        { action_respond_info("Post sensor triggered, finishing load") }
        M83
        G1 E30 F300
        M400
        _AUTOLOAD_RESTORE_TEMP

    {% elif steps >= 25 %}
        { action_respond_info("Autoload stopped, max travel reached") }
        _AUTOLOAD_RESTORE_TEMP

    {% else %}
        M83
        G1 E4 F300
        M400
        SET_GCODE_VARIABLE MACRO=AUTOLOAD_TO_POST VARIABLE=steps VALUE={steps + 1}
        UPDATE_DELAYED_GCODE ID=autoload_continue DURATION=0.15
    {% endif %}

[gcode_macro _AUTOLOAD_RESTORE_TEMP]
gcode:
    {% set restore = printer["gcode_macro AUTOLOAD_TO_POST"].restore_target|int %}
    { action_respond_info("Restoring previous extruder target") }
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={restore}
    SET_GCODE_VARIABLE MACRO=AUTOLOAD_TO_POST VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=autoload_continue DURATION=0

[delayed_gcode autoload_continue]
gcode:
    _AUTOLOAD_TO_POST_LOOP